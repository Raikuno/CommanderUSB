<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <title>New Role</title>
</head>
<body>
<header>
    <div th:replace="fragments/navbar :: navbar"></div>
</header>
<main class="container mt-4" style="max-width: 540px;">

    <h2 class="mb-4">New Role</h2>

    <div id="alert-container"></div>

    <form id="role-form" novalidate>
        <div class="mb-3">
            <label for="name" class="form-label">Role Name</label>
            <input type="text" class="form-control" id="name" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Permissions</label>
            <div id="permissions-container" class="border rounded p-3 bg-light">
                <span class="text-muted small">Loading permissions...</span>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" id="submit-btn">Create Role</button>
            <a th:href="@{/users/roles}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>

</main>
<script th:src="@{/js/private/roles_new.js}"></script>
</body>
</html>
