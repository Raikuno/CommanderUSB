<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <title>Role Administration</title>
</head>
<body>
<header>
    <div th:replace="fragments/navbar :: navbar"></div>
</header>
<main class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Role Administration</h2>
        <a th:href="@{/users/roles/new}" class="btn btn-primary">New Role</a>
    </div>

    <div class="mb-4">
        <a th:href="@{/users}" class="btn btn-outline-secondary me-2" sec:authorize="hasAuthority('USER_MANAGEMENT')">Users</a>
        <a th:href="@{/users/permissions}" class="btn btn-outline-secondary" sec:authorize="hasAuthority('MANAGE_ROLES')">Permissions</a>
    </div>

    <div id="alert-container"></div>

    <div id="roles-container" class="row g-3">
        <div class="col-12 text-center text-muted">Loading...</div>
    </div>

</main>
<script th:src="@{/js/public/utils.js}"></script>
<script th:src="@{/js/private/roles_index.js}"></script>
</body>
</html>
