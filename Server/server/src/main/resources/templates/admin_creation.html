<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <title>USBCommander Login Page</title>
</head>
<body>
    <header>
        <div th:replace="~{fragments/navbar_decoration :: navbar_decoration}"></div>
    </header>
    <main class="flex-column justify-content-center">
        <h1 
        class="text-center mt-5">
            No accounts found on the database.<br>Please, create an admin account
        </h1>

        <div class="card w-50 mt-5 ms-auto me-auto bg-body-secondary shadow-lg">
            <div class="card-body">
                <form id="createAdminForm" th:action="@{/api/auth/firstuser}" method="post" th:method="post">
                    <input id="_csrf" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="admin@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Name" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="8" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}" title="At least 8 characters, including an uppercase letter, a lowercase letter and a digit">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="8" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}" title="At least 8 characters, including an uppercase letter, a lowercase letter and a digit">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button id="submitBtn" type="submit" class="btn btn-primary">Create Admin Account</button>
                    </div>
                </form>
                
            </div>
        </div>
    </main>
    <script th:src="@{/js/public/utils.js}"></script>
    <script th:src="@{/js/public/admin_creation_script.js}"></script>
</body>
</html>
