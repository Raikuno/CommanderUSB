<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="machineList" class="mt-5">
    <h3 id="machines_title">It seems that there is no machine that requires a revision</h3>
    <div id="unrevised-machines-container" class="d-flex flex-wrap gap-3 bg-body-secondary shadow-lg p-2">
        <!-- populated by unrevised_machines.js -->
    </div>

    <template id="machine-card-template">
        <div class="card" style="width: 10rem;">
            <div class="p-3">
                <div class="ratio ratio-1x1 bg-light rounded">
                    <img src="/images/computer_icon.png" alt="Computer" class="p-2 object-fit-contain">
                </div>
            </div>
            <div class="card-body d-flex flex-column p-3 pt-0">
                <h6 class="card-title mb-1 text-truncate" data-field="name"></h6>
                <small class="text-muted text-truncate" data-field="ip"></small>
            </div>
        </div>
    </template>

    <script th:src="@{/js/public/unrevised_machines.js}"></script>
</div>

</body>
</html>
