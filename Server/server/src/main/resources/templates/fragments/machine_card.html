<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="machineCard(machine)">
    <div class="card h-100" style="width: 10rem;">
        <div class="p-3">
            <div class="ratio ratio-1x1 bg-light rounded">
                <img th:src="@{/images/computer_icon.png}" alt="Computer" class="p-2 object-fit-contain">
            </div>
        </div>
        <div class="card-body d-flex flex-column p-3 pt-0">
            <h6 class="card-title mb-1 text-truncate" th:text="${machine.getName()}"></h6>
            <small class="text-muted text-truncate" th:text="${machine.getIp()}"></small>
        </div>
    </div>
</div>

</body>
</html>
