<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <title>Machines</title>
</head>
<body>
<header>
    <div th:replace="fragments/navbar :: navbar"></div>
</header>
<main class="container mt-4">

    <h2 class="mb-4">Machines</h2>

    <div id="alert-container" class="mb-3"></div>

    <form id="filter-form" class="card card-body mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-4">
                <label for="filter-name" class="form-label">Name</label>
                <input type="text" id="filter-name" class="form-control" placeholder="Contains...">
            </div>
            <div class="col-md-4">
                <label for="filter-ip" class="form-label">IP</label>
                <input type="text" id="filter-ip" class="form-control" placeholder="Contains...">
            </div>
            <div class="col-md-4 d-flex align-items-center">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="filter-connected">
                    <label class="form-check-label" for="filter-connected">
                        Only connected
                    </label>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <button class="btn btn-link p-0" type="button"
                    data-bs-toggle="collapse" data-bs-target="#advanced-filters"
                    aria-expanded="false" aria-controls="advanced-filters">
                Advanced filters
            </button>
            <div class="collapse mt-2" id="advanced-filters">
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filter-show-disabled">
                            <label class="form-check-label" for="filter-show-disabled">
                                Show disabled machines
                            </label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="filter-needs-revision">
                            <label class="form-check-label" for="filter-needs-revision">
                                Only machines that need revision
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <div id="machines-grid" class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3">
        <div class="col-12 text-center text-muted py-3" id="machines-empty">Loading...</div>
    </div>

</main>

<div th:replace="fragments/machine_card :: machineCardTemplate"></div>

<script th:src="@{/js/private/machines_index.js}"></script>
</body>
</html>
