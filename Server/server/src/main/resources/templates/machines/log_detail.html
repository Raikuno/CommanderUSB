<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <title>Log Detail</title>
</head>
<body>
<header>
    <div th:replace="fragments/navbar :: navbar"></div>
</header>
<main class="container mt-4" style="max-width: 800px;">

    <div class="mb-3">
        <a th:href="@{|/machines/${machineId}|}" class="btn btn-outline-secondary btn-sm">&larr; Back to Machine</a>
    </div>

    <div id="alert-container" class="mb-3"></div>

    <div id="log-header" class="mb-3">
        <h2 id="machine-name" class="mb-1">—</h2>
        <h5 id="machine-ip" class="text-muted">—</h5>
    </div>

    <div id="log-container" class="log-detail-container mb-4">
        <table class="table table-borderless mb-3" id="log-detail-table">
            <colgroup>
                <col style="width: 35%">
                <col style="width: 65%">
            </colgroup>
            <tbody id="log-detail-tbody">
                <tr><td colspan="2" class="text-center text-muted">Loading...</td></tr>
            </tbody>
        </table>
        <div class="text-end">
            <button class="btn btn-success" id="revise-btn" disabled>Mark as Revised</button>
        </div>
    </div>

</main>

<div class="modal fade" id="reviseModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Revision</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to mark this log as revised? This action cannot be undone.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success" id="confirm-revise-btn">Confirm</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    window.LOG_ID   = /*[[${logId}]]*/ '';
    window.BACK_URL = /*[[|/machines/${machineId}|]]*/ '';
</script>
<script th:src="@{/js/public/utils.js}"></script>
<script th:src="@{/js/private/logs_detail.js}"></script>
</body>
</html>
