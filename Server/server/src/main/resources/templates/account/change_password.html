<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <title>Change Password</title>
</head>
<body>
<header>
    <div th:replace="fragments/navbar :: navbar"></div>
</header>
<main class="container mt-4" style="max-width: 540px;">

    <h2 class="mb-4">Change Password</h2>

    <div id="alert-container"></div>

    <form id="change-password-form" novalidate>
        <div class="mb-3">
            <label for="currentPassword" class="form-label">Current Password</label>
            <input type="password" class="form-control" id="currentPassword" required>
        </div>
        <div class="mb-3">
            <label for="newPassword" class="form-label">New Password</label>
            <input type="password" class="form-control" id="newPassword" required>
        </div>
        <div class="mb-4">
            <label for="confirmPassword" class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" id="confirmPassword" required>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" id="submit-btn">Update Password</button>
            <a th:href="@{/}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>

</main>
<script th:src="@{/js/private/account_change_password.js}"></script>
</body>
</html>
