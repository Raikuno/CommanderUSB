<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <title>USBCommander Login Page</title>
</head>
<body>
    <header>
        <div th:replace="~{fragments/navbar_decoration :: navbar_decoration}"></div>
    </header>
    <main>
    <h1 class="text-center mt-5">Insert your credentials</h1>
        <div class="card w-50 mt-5 ms-auto me-auto bg-body-secondary shadow-lg">
            <div class="card-body">
                <form id="loginForm" th:action="@{/api/auth/login}" method="post" th:method="post">
                    <input id="_csrf" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <div class="row">
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button id="submitBtn" type="submit" class="btn btn-primary">Login</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script th:src="@{/js/public/login_script.js}"></script>
</body>
</html>
