<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
    <title>Logs</title>
</head>
<body>
<header>
    <div th:replace="fragments/navbar :: navbar"></div>
</header>
<main class="container-fluid mt-4 px-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Unrevised Logs</h2>
        <button class="btn btn-primary" id="mark-revised-btn" sec:authorize="hasAuthority('SOLVE_LOGS')">Mark as Revised</button>
    </div>

    <div id="alert-container" class="mb-2"></div>

    <div style="max-height: 70vh; overflow-y: auto;">
        <table class="table table-borderless mb-0" id="logs-table">
            <thead class="table-dark" style="position: sticky; top: 0; z-index: 1;">
                <tr>
                    <th>Machine</th>
                    <th>Date</th>
                    <th>Type</th>
                    <th></th>
                    <th></th>
                    <th sec:authorize="hasAuthority('SOLVE_LOGS')"><input type="checkbox" id="select-all"></th>
                </tr>
            </thead>
            <tbody id="logs-tbody">
                <tr><td colspan="6" class="text-center text-muted py-3">Loading...</td></tr>
            </tbody>
        </table>
    </div>

</main>

<!-- Confirm revision modal -->
<div class="modal fade" id="reviseModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm Revision</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to mark <strong id="revise-count">0</strong> log(s) as revised?
                This action cannot be undone.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirm-revise-btn">Confirm</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/public/utils.js}"></script>
<script th:src="@{/js/private/logs_index.js}"></script>
</body>
</html>
